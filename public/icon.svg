<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1db954;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0d0e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="noteGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1ed760;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1db954;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background Circle with Premium Gradient -->
  <circle cx="256" cy="256" r="240" fill="url(#grad)" stroke="#1db954" stroke-width="8" />
  
  <!-- Sleek Musical Note with Glow -->
  <g filter="url(#glow)">
    <path d="M200 340 V140 L380 100 V260" fill="none" stroke="url(#noteGrad)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
    <circle cx="164" cy="340" r="48" fill="url(#noteGrad)" />
    <circle cx="344" cy="260" r="48" fill="url(#noteGrad)" />
    <!-- Connecting beam accent -->
    <path d="M200 160 L380 120" stroke="#ffffff" stroke-width="8" opacity="0.3" stroke-linecap="round" />
  </g>
</svg>
